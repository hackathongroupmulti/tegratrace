name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: ${{ matrix.config }} Build
    runs-on: windows-latest
    strategy:
      matrix:
        config: [Release, Debug]
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      # Query the latest available SDK version once so the cache key is stable
      - name: Query latest Vulkan SDK version
        id: vk
        shell: pwsh
        run: |
          $ver = (Invoke-RestMethod "https://vulkan.lunarg.com/sdk/latest/windows.txt").Trim()
          Write-Host "Vulkan SDK $ver"
          "version=$ver" | Out-File $env:GITHUB_OUTPUT -Encoding utf8 -Append

      # Cache the fully-installed SDK directory — skips the 2-min install on repeat runs
      - name: Restore Vulkan SDK cache
        id: vk-cache
        uses: actions/cache@v4
        with:
          path: C:\VulkanSDK
          key: vulkan-sdk-${{ steps.vk.outputs.version }}

      - name: Download and install Vulkan SDK
        if: steps.vk-cache.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          $ver = "${{ steps.vk.outputs.version }}"
          $base = "https://sdk.lunarg.com/sdk/download/$ver/windows"
          # SDK 1.4.x uses vulkan_sdk.exe; 1.3.x used VulkanSDK-{ver}-Installer.exe
          $candidates = @("$base/vulkan_sdk.exe", "$base/VulkanSDK-$ver-Installer.exe")
          $ok = $false
          foreach ($url in $candidates) {
            Write-Host "Trying $url"
            try {
              Invoke-WebRequest -Uri $url -OutFile VulkanSDK.exe -UseBasicParsing -ErrorAction Stop
              $ok = $true; break
            } catch { Write-Host "Not found, trying next..." }
          }
          if (-not $ok) { Write-Error "No installer found for Vulkan SDK $ver"; exit 1 }
          Write-Host "Installing..."
          Start-Process VulkanSDK.exe `
            -ArgumentList "--accept-licenses","--default-answer","--confirm-command","install" `
            -Wait

      - name: Set Vulkan SDK environment
        shell: pwsh
        run: |
          $ver = "${{ steps.vk.outputs.version }}"
          "VULKAN_SDK=C:\VulkanSDK\$ver" | Out-File $env:GITHUB_ENV -Encoding utf8 -Append
          "C:\VulkanSDK\$ver\Bin"        | Out-File $env:GITHUB_PATH -Encoding utf8 -Append
          Write-Host "VULKAN_SDK=C:\VulkanSDK\$ver"

      - name: Verify glslc
        run: glslc --version

      - name: Configure CMake
        run: cmake -S . -B build -A x64

      - name: Build ${{ matrix.config }}
        run: cmake --build build --config ${{ matrix.config }} --parallel

      # ── Release-only checks ────────────────────────────────────────────────

      - name: Verify SPIR-V artifacts
        if: matrix.config == 'Release'
        shell: pwsh
        run: |
          $expected = @(
            "triangle.vert.spv",   "triangle.frag.spv",
            "mesh.vert.spv",       "mesh.frag.spv",
            "pbr.vert.spv",        "pbr.frag.spv",
            "pbr.task.spv",        "pbr.mesh.spv",
            "cull.comp.spv",
            "env_to_cube.comp.spv",
            "ibl_prefilter.comp.spv",
            "ibl_irradiance.comp.spv"
          )
          $fail = $false
          foreach ($s in $expected) {
            $p = "build\Release\shaders\$s"
            if (Test-Path $p) {
              Write-Host ("OK   {0,-35}  {1,8} bytes" -f $s, (Get-Item $p).Length)
            } else {
              Write-Error "MISSING: $s"
              $fail = $true
            }
          }
          if ($fail) { exit 1 }

      - name: Verify output directories exist
        if: matrix.config == 'Release'
        shell: pwsh
        run: |
          foreach ($d in @("captures","reports","references")) {
            $p = "build\Release\$d"
            if (Test-Path $p) { Write-Host "OK   $p" }
            else               { Write-Error "Missing output dir: $p"; exit 1 }
          }

      - name: Upload release artifact
        if: matrix.config == 'Release'
        uses: actions/upload-artifact@v4
        with:
          name: tegratrace-windows-release
          path: |
            build/Release/tegratrace.exe
            build/Release/shaders/
          if-no-files-found: error
