name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Vulkan SDK
        shell: pwsh
        run: |
          $ver = "1.3.275.0"
          $url = "https://sdk.lunarg.com/sdk/download/$ver/windows/VulkanSDK-$ver-Installer.exe"
          Write-Host "Downloading Vulkan SDK $ver..."
          Invoke-WebRequest -Uri $url -OutFile VulkanSDK.exe -UseBasicParsing
          Write-Host "Running silent install..."
          $proc = Start-Process VulkanSDK.exe `
            -ArgumentList "--accept-licenses", "--default-answer", "--confirm-command", "install" `
            -PassThru -Wait
          Write-Host "Installer exit code: $($proc.ExitCode)"
          "VULKAN_SDK=C:\VulkanSDK\$ver" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "C:\VulkanSDK\$ver\Bin"        | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Configure CMake
        run: cmake -S . -B build -G "Visual Studio 17 2022" -A x64

      - name: Build Release
        run: cmake --build build --config Release --parallel

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: tegratrace-windows-release
          path: build/Release/tegratrace.exe
          if-no-files-found: error
